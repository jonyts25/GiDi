# Solo servicio Gidi API: variable RAILWAY_CONFIG_FILE=railway.toml
# (La web no debe usar este archivo — no tiene /health)

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "pnpm --filter api run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
