# Solo servicio Gidi API → variable RAILWAY_CONFIG_FILE=railway.api.toml
# No usar railway.toml en la raíz: Railway lo aplica a TODOS los servicios del repo.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "pnpm --filter api run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
